name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          set -euxo pipefail
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-w -s" -o "tgctl-${{ matrix.suffix }}${EXT}" ./cmd/tgctl/

      - name: Package
        run: |
          set -euxo pipefail
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "tgctl-${{ matrix.suffix }}.zip" "tgctl-${{ matrix.suffix }}.exe"
          else
            tar czf "tgctl-${{ matrix.suffix }}.tar.gz" "tgctl-${{ matrix.suffix }}"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: tgctl-${{ matrix.suffix }}
          path: |
            tgctl-${{ matrix.suffix }}.tar.gz
            tgctl-${{ matrix.suffix }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
