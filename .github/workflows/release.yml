name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: macos-15
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gperf openssl cmake

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gperf libssl-dev zlib1g-dev build-essential

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install gperf cmake openssl -y
          echo "OPENSSL_ROOT_DIR=C:\Program Files\OpenSSL-Win64" >> $env:GITHUB_ENV

      - name: Build TDLib
        if: runner.os != 'Windows'
        run: |
          git clone --depth 1 https://github.com/tdlib/td.git /tmp/td
          cd /tmp/td && mkdir build && cd build
          if [ "${{ runner.os }}" = "macOS" ]; then
            OPENSSL_ROOT=$(brew --prefix openssl@3)
          else
            OPENSSL_ROOT=/usr
          fi
          cmake -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_ROOT \
            -DCMAKE_INSTALL_PREFIX=$HOME/.local/tdlib \
            ..
          cmake --build . --target tdjson -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cmake --install . || true
          # copy headers if missing
          mkdir -p $HOME/.local/tdlib/include/td/telegram
          cp /tmp/td/td/telegram/td_json_client.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true
          cp /tmp/td/td/telegram/td_log.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true
          cp /tmp/td/build/td/telegram/tdjson_export.h $HOME/.local/tdlib/include/td/telegram/ 2>/dev/null || true

      - name: Build TDLib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/tdlib/td.git C:\td
          cd C:\td; mkdir build; cd build
          cmake -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR" `
            -DCMAKE_INSTALL_PREFIX=C:\tdlib `
            ..
          cmake --build . --target tdjson --config Release -- /m
          # manual install since cmake --install may fail
          New-Item -ItemType Directory -Force -Path C:\tdlib\lib | Out-Null
          New-Item -ItemType Directory -Force -Path C:\tdlib\bin | Out-Null
          New-Item -ItemType Directory -Force -Path C:\tdlib\include\td\telegram | Out-Null
          Copy-Item C:\td\build\Release\tdjson.dll C:\tdlib\bin\ -ErrorAction SilentlyContinue
          Copy-Item C:\td\build\Release\tdjson.lib C:\tdlib\lib\ -ErrorAction SilentlyContinue
          Copy-Item C:\td\td\telegram\td_json_client.h C:\tdlib\include\td\telegram\ -ErrorAction SilentlyContinue
          Copy-Item C:\td\td\telegram\td_log.h C:\tdlib\include\td\telegram\ -ErrorAction SilentlyContinue
          # find tdjson_export.h
          Get-ChildItem -Path C:\td\build -Recurse -Filter "tdjson_export.h" | ForEach-Object { Copy-Item $_.FullName C:\tdlib\include\td\telegram\ }

      - name: Build tgctl
        if: runner.os != 'Windows'
        env:
          CGO_CFLAGS: -I${{ github.workspace }}/tdlib/include
          CGO_LDFLAGS: -L${{ github.workspace }}/tdlib/lib -ltdjson
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # symlink tdlib
          ln -sf $HOME/.local/tdlib ${{ github.workspace }}/tdlib
          CGO_CFLAGS="-I$HOME/.local/tdlib/include" \
          CGO_LDFLAGS="-L$HOME/.local/tdlib/lib -ltdjson" \
          CGO_ENABLED=1 \
          go build -ldflags="-w -s" -o tgctl-${{ matrix.suffix }} ./cmd/tgctl/

      - name: Build tgctl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # symlink tdlib
          New-Item -ItemType Junction -Path tdlib -Target C:\tdlib -Force | Out-Null
          $env:CGO_CFLAGS = "-IC:\tdlib\include"
          $env:CGO_LDFLAGS = "-LC:\tdlib\lib -ltdjson"
          $env:CGO_ENABLED = "1"
          go build -ldflags="-w -s" -o tgctl-${{ matrix.suffix }}.exe ./cmd/tgctl/

      - name: Package
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp tgctl-${{ matrix.suffix }} dist/
          cp $HOME/.local/tdlib/lib/libtdjson* dist/ 2>/dev/null || true
          cd dist && tar czf ../tgctl-${{ matrix.suffix }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item tgctl-${{ matrix.suffix }}.exe dist\
          Copy-Item C:\tdlib\bin\tdjson.dll dist\ -ErrorAction SilentlyContinue
          Copy-Item C:\tdlib\lib\tdjson.dll dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath tgctl-${{ matrix.suffix }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: tgctl-${{ matrix.suffix }}
          path: |
            tgctl-${{ matrix.suffix }}.tar.gz
            tgctl-${{ matrix.suffix }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
